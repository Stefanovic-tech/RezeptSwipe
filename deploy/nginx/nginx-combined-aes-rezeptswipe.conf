# Beispiel: eine nginx.conf mit AES (bestehend) + RezeptSwipe (Next.js PM2 Port 3015).
# Pfade/Zertifikate an deine Umgebung anpassen, dann z.B. unter C:/nginx/conf/nginx.conf einbinden
# oder Inhalte in eure Hauptkonfiguration kopieren.

worker_processes  1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 50M;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss
               application/json application/xml;

    server_names_hash_bucket_size 128;
    server_names_hash_max_size 2048;

    # --- AES (unveraendert zur Vorlage) ---
    upstream aes_backend {
        server 127.0.0.1:3003;
        keepalive 64;
    }

    # --- RezeptSwipe: Next.js (PM2 next start -p 3015) ---
    upstream rezeptswipe_backend {
        server 127.0.0.1:3015;
        keepalive 64;
    }

    ##########################################################################
    # DOMAIN 1 — aes.ax-services.net (Wildcard-Subdomains)
    ##########################################################################

    server {
        listen 80;
        server_name aes.ax-services.net *.aes.ax-services.net;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name aes.ax-services.net *.aes.ax-services.net;

        ssl_certificate     C:/Certbot/live/aes.ax-services.net/fullchain.pem;
        ssl_certificate_key C:/Certbot/live/aes.ax-services.net/privkey.pem;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root C:/webseite/aes/client/dist;
        index index.html;

        location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
            root C:/webseite/aes/client/dist;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://aes_backend;
            proxy_http_version 1.1;

            client_max_body_size 50M;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://aes_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        location ^~ /uploads/ {
            proxy_pass http://aes_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    ##########################################################################
    # DOMAIN 2 — RezeptSwipe (rezept.krinulovic.ch)
    # Hostname + Zertifikatspfad bei Bedarf aendern (z.B. eigenes Certbot-Verzeichnis).
    # Hinter Cloudflare: SSL/TLS "Full (strict)", Caching fuer HTML/API bypassen.
    ##########################################################################

    server {
        listen 80;
        server_name rezept.krinulovic.ch;

        location /.well-known/acme-challenge/ {
            root C:/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name rezept.krinulovic.ch;

        # Zertifikat: Certbot (wie AES) oder z.B. C:/nginx/ssl/rezept.krinulovic.ch/...
        ssl_certificate     C:/Certbot/live/rezept.krinulovic.ch/fullchain.pem;
        ssl_certificate_key C:/Certbot/live/rezept.krinulovic.ch/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Next Server Actions / JSON (next.config bodySizeLimit 1mb) + etwas Puffer
        client_max_body_size 4m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        location = /api/health {
            proxy_pass http://rezeptswipe_backend/api/health;
            access_log off;
        }

        location /_next/static/ {
            proxy_pass http://rezeptswipe_backend;
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            proxy_pass http://rezeptswipe_backend;
            proxy_cache_bypass $http_upgrade;
        }

        access_log C:/nginx/logs/rezeptswipe.access.log;
        error_log  C:/nginx/logs/rezeptswipe.error.log warn;
    }
}
