# Nginx Site-Konfiguration fuer rezept.krinulovic.ch
# Pfad-Konvention auf Windows: C:/nginx/conf/sites-enabled/rezept.krinulovic.ch.conf
# Zertifikate werden ueber den OpenSSL-Workflow erzeugt und in C:/nginx/ssl/rezept.krinulovic.ch/ abgelegt.
#
# --- Cloudflare (DNS Proxy / orange Wolke) ---
# - SSL/TLS-Modus am Origin: "Full" oder "Full (strict)" (Origin muss HTTPS auf 443 sprechen).
#   "Flexible" ist falsch: Next sieht dann HTTP und z.B. Cookie-Flags koennen inkonsistent werden.
# - Caching: HTML und /api/* nicht cachen (Cache Rules: Bypass fuer Host oder URI-Pfade).
# - Optional im http{} der Haupt-nginx.conf: real_ip von Cloudflare-IP-Ranges setzen, damit
#   access_log $remote_addr die echte Besucher-IP zeigt (siehe https://www.cloudflare.com/ips/ ).

# 1) HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name rezept.krinulovic.ch;

    # ACME-Challenge optional (falls ihr spaeter http-01 nutzt)
    location /.well-known/acme-challenge/ {
        root C:/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2) HTTPS -> Next.js auf 127.0.0.1:3015
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rezept.krinulovic.ch;

    ssl_certificate     C:/nginx/ssl/rezept.krinulovic.ch/fullchain.pem;
    ssl_certificate_key C:/nginx/ssl/rezept.krinulovic.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Sicherheits-Header
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Mobile/Asset-Verhalten
    client_max_body_size 2m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Health-Check direkt
    location = /api/health {
        proxy_pass http://127.0.0.1:3015/api/health;
        access_log off;
    }

    # Statics aus _next werden mit langem Caching ausgeliefert (Next setzt selbst ETag)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3015;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_cache_bypass $http_upgrade;
    }

    # Logs
    access_log C:/nginx/logs/rezept.access.log;
    error_log  C:/nginx/logs/rezept.error.log warn;
}
